name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FreelanceOps.sln

      - name: Build
        run: dotnet build FreelanceOps.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FreelanceOps.sln --no-build --configuration Release

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build API Docker image
        run: docker build -f docker/Dockerfile.api -t freelanceops-api:ci .

      - name: Build Worker Docker image
        run: docker build -f docker/Dockerfile.worker -t freelanceops-worker:ci .
